<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - SimuSync</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="login-container">

    <div class="login-card">

       

        <p>Sistema de Algoritmos Distribuidos</p>

        <input
            type="text"
            id="usuario"
            placeholder="Usuario">

        <input
            type="password"
            id="password"
            placeholder="Contraseña">

        <button onclick="iniciarSesion()">
            Iniciar Sesión
        </button>

    </div>

</div>

<script src="app.js"></script>

</body>
</html>
